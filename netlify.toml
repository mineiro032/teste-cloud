# Netlify config - aponta pra subpasta privatesocial/

[build]
  base = "privatesocial"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"
  # Permite que o Prisma rode durante o build sem warnings
  PRISMA_HIDE_UPDATE_MESSAGE = "true"

# Plugin oficial do Next.js — gera funções serverless automaticamente
[[plugins]]
  package = "@netlify/plugin-nextjs"
